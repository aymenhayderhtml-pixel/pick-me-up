<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower of Trials — Pick Me Up</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-bright: #e8c96a;
            --gold-dim: #7a5f28;
            --gold-glow: rgba(201, 168, 76, 0.3);
            --star5: #ffd700;
            --star4: #c080ff;
            --star3: #60a0ff;
            --star2: #60ff80;
            --star1: #aaaaaa;
            --purple: #7c3fb0;
            --red: #cc2222;
            --dark: #06060e;
            --panel: rgba(8, 6, 18, 0.82);
            --panel-solid: rgba(10, 8, 22, 0.95);
            --border: rgba(201, 168, 76, 0.25);
            --border-bright: rgba(201, 168, 76, 0.6);
            --text: #e8e0d0;
            --text-muted: #7a6f5a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Crimson Text', serif;
            background: var(--dark);
            color: var(--text);
        }

        .global-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: url('images/summon-bg.jpg');
            background-size: cover;
            background-position: center;
        }

        .global-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(4, 4, 14, 0.65);
            pointer-events: none;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold-dim);
            border-radius: 4px;
        }

        h1,
        h2,
        h3,
        h4,
        .title,
        .label,
        .stat-val,
        .btn-gold,
        .floor-btn,
        .speed-btn {
            font-family: 'Cinzel', serif;
        }

        .body-text {
            font-family: 'Crimson Text', serif;
        }

        .topbar {
            position: relative;
            z-index: 10;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            backdrop-filter: blur(14px);
            background: rgba(4, 4, 14, 0.92);
            border-bottom: 1px solid var(--border);
        }

        .topbar .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--gold);
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .topbar .back-btn:hover {
            color: var(--gold-bright);
        }

        .topbar .title {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        .topbar .resources {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .res-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }

        .res-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .main-layout {
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 20px;
            padding: 20px;
            height: calc(100% - 60px);
        }

        .panel {
            background: var(--panel);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .corner-ornament {
            position: relative;
        }

        .corner-ornament::before,
        .corner-ornament::after {
            content: '';
            position: absolute;
            width: 13px;
            height: 13px;
            border: 2px solid var(--gold);
        }

        .corner-ornament::before {
            top: 4px;
            left: 4px;
            border-right: 0;
            border-bottom: 0;
        }

        .corner-ornament::after {
            bottom: 4px;
            right: 4px;
            border-left: 0;
            border-top: 0;
        }

        .panel-title {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--gold);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        /* FIXED: Floor Grid Clipping */
        .floor-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            overflow-y: auto;
            padding: 4px 6px 10px 4px;
            flex: 1;
        }

        .floor-btn {
            width: 100%;
            min-width: 0;
            aspect-ratio: 1/1;
            border: 1px solid var(--border);
            background: rgba(15, 12, 30, 0.5);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            color: var(--text-muted);
            position: relative;
        }

        .floor-btn:hover {
            background: rgba(201, 168, 76, 0.15);
            color: var(--text);
            border-color: var(--gold-bright);
        }

        .floor-btn.selected {
            background: rgba(201, 168, 76, 0.25);
            border-color: var(--gold);
            color: var(--gold-bright);
            box-shadow: 0 0 10px var(--gold-glow);
        }

        .floor-btn.cleared {
            border-color: var(--star3);
            color: var(--star3);
        }

        .floor-btn.cleared::after {
            content: '✓';
            position: absolute;
            top: 3px;
            right: 4px;
            font-size: 0.7rem;
        }

        .floor-btn.boss {
            border-color: var(--red);
            background: rgba(204, 34, 34, 0.1);
        }

        .floor-btn.boss .skull {
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .floor-btn.boss.cleared {
            border-color: #44dd88;
            color: #44dd88;
        }

        /* Right Panel Layout (Scroll + Fixed Bottom) */
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 6px;
            margin-bottom: 12px;
        }

        .panel-footer {
            flex-shrink: 0;
            border-top: 1px solid var(--border);
            padding-top: 12px;
            margin-top: auto;
        }

        .detail-section {
            margin-bottom: 16px;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 12px;
        }

        .detail-section:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .floor-info h3 {
            font-size: 1.2rem;
            margin-bottom: 6px;
        }

        .floor-info p {
            color: var(--text-muted);
            line-height: 1.4;
            font-size: 0.95rem;
        }

        .enemies-preview {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .enemy-card {
            width: 64px;
            height: 72px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .enemy-card.boss-enemy {
            border-color: var(--red);
        }

        .reward-list {
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .reward-list span {
            display: block;
            color: var(--star5);
            margin: 2px 0;
        }

        /* FIXED: Larger Party & Pool */
        .party-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .party-slot {
            height: 110px;
            border: 2px dashed var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.2);
            transition: 0.2s;
            position: relative;
        }

        .party-slot.filled {
            border-style: solid;
            border-color: var(--gold);
            background: rgba(201, 168, 76, 0.1);
        }

        .party-slot .hero-img {
            width: 56px;
            height: 56px;
            border-radius: 6px;
            object-fit: cover;
            border: 2px solid var(--gold-dim);
        }

        .party-slot .hero-name {
            font-size: 0.8rem;
            margin-top: 6px;
            text-align: center;
            line-height: 1.2;
            color: var(--text);
        }

        .party-slot .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 16px;
            height: 16px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 0.6rem;
            cursor: pointer;
            display: none;
        }

        .party-slot.filled:hover .remove-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-pool {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .pool-hero {
            width: 100%;
            aspect-ratio: 3/4;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.2s;
            background: rgba(0, 0, 0, 0.3);
        }

        .pool-hero:hover {
            border-color: var(--gold-bright);
            transform: scale(1.05);
        }

        .pool-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pool-hero .star {
            position: absolute;
            bottom: 4px;
            left: 4px;
            font-size: 0.7rem;
            color: var(--gold-bright);
            text-shadow: 0 1px 3px #000;
        }

        .pool-hero:hover .star {
            color: var(--star5);
        }

        /* Controls */
        .action-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-gold {
            flex: 1;
            padding: 12px;
            background: linear-gradient(to bottom, var(--gold-bright), var(--gold-dim));
            border: 1px solid var(--gold);
            border-radius: 8px;
            color: #1a1005;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-gold:hover {
            box-shadow: 0 0 15px var(--gold-glow);
        }

        .btn-gold:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .toggle-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .toggle {
            width: 36px;
            height: 18px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }

        .toggle.active {
            background: var(--gold);
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            transition: 0.2s;
        }

        .toggle.active::after {
            left: 20px;
        }

        .speed-btns {
            display: flex;
            gap: 4px;
        }

        .speed-btn {
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.75rem;
        }

        .speed-btn.active {
            background: var(--gold-dim);
            color: #fff;
            border-color: var(--gold);
        }

        /* Combat Overlay */
        .combat-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: var(--panel-solid);
            backdrop-filter: blur(12px);
            display: none;
            flex-direction: column;
            padding: 20px;
        }

        .combat-overlay.active {
            display: flex;
        }

        .combat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .combat-title {
            font-size: 1.4rem;
            color: var(--gold);
        }

        .combat-close {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.5rem;
            padding: 4px;
        }

        .combat-close:hover {
            color: var(--red);
        }

        .battle-stage {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 80px 1fr;
            gap: 20px;
            align-items: center;
        }

        .combatants {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .combatant {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .combatant.active-turn {
            border-color: var(--gold-bright);
            box-shadow: 0 0 10px var(--gold-glow);
        }

        .combatant.dead {
            opacity: 0.4;
            filter: grayscale(0.8);
        }

        .combatant img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold-dim);
        }

        .combatant-info {
            flex: 1;
        }

        .combatant-info .name {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
        }

        .hp-bar {
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 4px;
            overflow: hidden;
        }

        .hp-fill {
            height: 100%;
            background: var(--star3);
            width: 100%;
            transition: width 0.3s;
        }

        .hp-text {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--red);
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 10px rgba(204, 34, 34, 0.5);
        }

        .combat-log {
            height: 130px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            margin-top: 16px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 4px;
        }

        .dmg {
            color: var(--red);
        }

        .heal {
            color: var(--star3);
        }

        .crit {
            color: var(--star5);
            font-weight: bold;
        }

        .result-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--panel-solid);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            width: 320px;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 200;
        }

        .result-modal.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .result-title {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .result-title.victory {
            color: var(--star5);
        }

        .result-title.defeat {
            color: var(--red);
        }

        .rewards-summary {
            margin: 15px 0;
            font-size: 1.1rem;
        }

        .result-btn {
            margin-top: 10px;
            width: 100%;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="global-bg"></div>

    <header class="topbar">
        <div class="back-btn" onclick="location.href='index.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Return to Lobby
        </div>
        <div class="title">Tower of Trials</div>
        <div class="resources">
            <div class="res-item">
                <div class="res-icon" style="background:#60a0ff"></div><span id="goldDisplay">0</span>
            </div>
            <div class="res-item">
                <div class="res-icon" style="background:#e8c96a"></div><span id="gemDisplay">0</span>
            </div>
        </div>
    </header>

    <main class="main-layout">
        <section class="panel left-panel corner-ornament">
            <h2 class="panel-title">Select Floor</h2>
            <div class="floor-grid" id="floorGrid"></div>
        </section>

        <section class="panel right-panel corner-ornament">
            <div class="panel-content">
                <div class="detail-section">
                    <div class="floor-info">
                        <h3 id="detailFloorTitle">Floor 1 — The Awakened Hall</h3>
                        <p id="detailFloorDesc">A quiet trial. Weak enemies await.</p>
                    </div>
                    <div class="enemies-preview" id="enemyPreview"></div>
                    <div class="reward-list" id="rewardPreview"><span>+500 Gold</span></div>
                </div>

                <div class="detail-section">
                    <h2 class="panel-title">Deploy Party</h2>
                    <div class="party-grid" id="partyGrid"></div>
                    <div style="margin-top:10px; font-size:0.85rem; color:var(--text-muted);">Select Heroes:</div>
                    <div class="hero-pool" id="heroPool"></div>
                </div>
            </div>

            <div class="panel-footer">
                <div class="action-row">
                    <button class="btn-gold" id="enterBtn" disabled>ENTER FLOOR</button>
                    <div class="toggle-group">
                        <span class="toggle-label">Auto</span>
                        <div class="toggle" id="autoToggle"></div>
                        <span class="toggle-label">Speed</span>
                        <div class="speed-btns">
                            <button class="speed-btn active" data-speed="1">1x</button>
                            <button class="speed-btn" data-speed="2">2x</button>
                            <button class="speed-btn" data-speed="3">3x</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="combat-overlay" id="combatOverlay">
        <div class="combat-header">
            <div class="combat-title" id="combatFloorTitle">Floor 1</div>
            <div class="toggle-group" style="margin-left:auto;">
                <span class="toggle-label">Auto</span>
                <div class="toggle active" id="combatAutoToggle"></div>
                <span class="toggle-label">Speed</span>
                <div class="speed-btns">
                    <button class="speed-btn active" data-speed="1">1x</button>
                    <button class="speed-btn" data-speed="2">2x</button>
                    <button class="speed-btn" data-speed="3">3x</button>
                </div>
            </div>
            <div class="combat-close" onclick="endCombat()">✕</div>
        </div>

        <div class="battle-stage">
            <div class="combatants" id="heroesStage"></div>
            <div class="vs-divider">VS</div>
            <div class="combatants" id="enemiesStage"></div>
        </div>

        <div class="combat-log" id="combatLog"></div>
    </div>

    <div class="result-modal" id="resultModal">
        <div class="result-title" id="resultTitle">VICTORY</div>
        <p id="resultMsg" style="color:var(--text-muted); margin:8px 0;">The trial is overcome.</p>
        <div class="rewards-summary" id="resultRewards">+500 Gold</div>
        <button class="btn-gold result-btn" onclick="closeResult()">CONTINUE</button>
    </div>

    <script>
        const STORAGE_KEY = 'tower_state';
        const DEFAULT_STATE = { clearedFloor: 0, gold: 5000, gems: 1500 };
        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || DEFAULT_STATE;

        const FLOOR_NAMES = [
            "The Awakened Hall", "Whispering Corridor", "Broken Pillar", "Ashen Steps", "Mirror Pool",
            "Gilded Cage", "Silent Archive", "Frostbite Path", "Crimson Bridge", "Warden's Gate",
            "Bloodstone Stair", "Echoing Void", "Thorned Crown", "Obsidian Gate", "Shattered Sky",
            "Weeping Statues", "Iron Lattice", "Sunless Atrium", "Howling Depths", "Titan's Foot",
            "Veil of Embers", "Bone Orchard", "Glass Spire", "Drowning Cell", "Forgotten Throne",
            "Razor Wind", "Hollow Bell", "Cinder Vault", "Serpent Coil", "Judgment Stair",
            "Nightfall Keep", "Rust & Ruin", "Phantom Choir", "Salted Earth", "Cursed Loom",
            "Ironheart Bridge", "Ashfall Dome", "Shard Canyon", "Dreadwell", "Mourner's Peak",
            "Blackwater Port", "Crimson Ledger", "Frostfang Gate", "Gilded Maw", "Howlstone Pass",
            "Veilwalker", "Thornkeep", "Shattered Crown", "Duskfall Spire", "Bloodmoon Gate",
            "Whispering Iron", "Cinder Steps", "Glass Coffin", "Ironwood Hall", "Frostbite Spire",
            "Ashen Crown", "Shardkeep", "Dreadgate", "Mourner's Veil", "Bloodstone Hall",
            "Nightshade Port", "Crimson Vault", "Frostfall Bridge", "Gilded Maw", "Howlstone Peak",
            "Veilwalker Gate", "Thornkeep Spire", "Shattered Crown", "Duskfall Hall", "Bloodmoon Gate",
            "Whispering Iron", "Cinder Steps", "Glass Coffin", "Ironwood Hall", "Frostbite Spire",
            "Ashen Crown", "Shardkeep", "Dreadgate", "Mourner's Veil", "Bloodstone Hall",
            "Nightshade Port", "Crimson Vault", "Frostfall Bridge", "Gilded Maw", "Howlstone Peak",
            "Veilwalker Gate", "Thornkeep Spire", "Shattered Crown", "Duskfall Hall", "Bloodmoon Gate",
            "Whispering Iron", "Cinder Steps", "Glass Coffin", "Ironwood Hall", "Frostbite Spire",
            "Ashen Crown", "Shardkeep", "Dreadgate", "Mourner's Veil", "Final Ascension"
        ];

        let ownedHeroes = JSON.parse(localStorage.getItem('owned_heroes')) || [];
        if (ownedHeroes.length === 0) {
            ownedHeroes = [
                { id: 'h1', name: 'Demon Chef', star: 5, img: 'heros/5★ Demon Chef.png' },
                { id: 'h2', name: 'Void Libraria', star: 5, img: 'heros/5★ Void Libraria.png' },
                { id: 'h3', name: 'Archmage', star: 4, img: 'heros/4★ Archmage.png' },
                { id: 'h4', name: 'Paladin', star: 4, img: 'heros/4★ Paladin.png' },
                { id: 'h5', name: 'Shadow Assassin', star: 4, img: 'heros/4★ Shadow Assassin.png' },
                { id: 'h6', name: 'Chef (Master)', star: 3, img: 'heros/3★ Chef (Master).png' },
                { id: 'h7', name: 'Knight', star: 3, img: 'heros/3★ Knight.png' },
                { id: 'h8', name: 'Librarian', star: 3, img: 'heros/3★ Librarian (Arcane).png' },
                { id: 'h9', name: 'Mage', star: 3, img: 'heros/3★ Mage.png' },
                { id: 'h10', name: 'Apprentice Mage', star: 2, img: 'heros/2★ Apprentice Mage.png' },
                { id: 'h11', name: 'Cook', star: 2, img: 'heros/2★ Cook (Skilled).png' },
                { id: 'h12', name: 'Scout', star: 2, img: 'heros/2★ Scout.png' },
                { id: 'h13', name: 'Beggar', star: 1, img: 'heros/1★ Beggar.png' },
                { id: 'h14', name: 'Farmer', star: 1, img: 'heros/1★ Farmer.png' },
                { id: 'h15', name: 'Fisherman', star: 1, img: 'heros/1★ Fisherman.png' }
            ];
            localStorage.setItem('owned_heroes', JSON.stringify(ownedHeroes));
        }

        let selectedFloor = 1, party = [], autoBattle = true, battleSpeed = 1;
        let combatInterval = null, currentTurnIndex = 0, combatants = [];

        function init() {
            saveState(); renderFloors(); renderParty(); renderHeroPool(); selectFloor(1); updateUI(); bindEvents();
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            localStorage.setItem('owned_heroes', JSON.stringify(ownedHeroes));
        }

        function updateUI() {
            document.getElementById('goldDisplay').textContent = state.gold.toLocaleString();
            document.getElementById('gemDisplay').textContent = state.gems.toLocaleString();
            document.getElementById('enterBtn').disabled = party.length !== 5;
            document.querySelectorAll('.toggle').forEach(t => t.classList.toggle('active', autoBattle));
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.speed) === battleSpeed));
        }

        function renderFloors() {
            const grid = document.getElementById('floorGrid'); grid.innerHTML = '';
            for (let i = 1; i <= 100; i++) {
                const btn = document.createElement('div');
                btn.className = 'floor-btn' + (i === selectedFloor ? ' selected' : '');
                if (i <= state.clearedFloor) btn.classList.add('cleared');
                if (i % 10 === 0) btn.classList.add('boss');
                btn.innerHTML = i % 10 === 0 ? `<div class="skull">💀</div>F${i}` : `F${i}`;
                btn.onclick = () => selectFloor(i);
                grid.appendChild(btn);
            }
        }

        function selectFloor(n) {
            selectedFloor = n;
            document.querySelectorAll('.floor-btn').forEach((btn, i) => btn.classList.toggle('selected', i + 1 === n));
            const isBoss = n % 10 === 0;
            document.getElementById('detailFloorTitle').textContent = `Floor ${n} — ${FLOOR_NAMES[n - 1] || `Floor ${n}`}`;
            document.getElementById('detailFloorDesc').textContent = isBoss ? `A boss trial stands between you and the next tier. Tread carefully.` : `Standard trial. Enemies scale with floor progression.`;

            const preview = document.getElementById('enemyPreview'); preview.innerHTML = '';
            const types = isBoss ? ['Warden'] : ['Wraith', 'Goblin', 'Skeleton'];
            for (let i = 0; i < (isBoss ? 1 : 3); i++) {
                const e = document.createElement('div');
                e.className = 'enemy-card' + (isBoss ? ' boss-enemy' : '');
                e.innerHTML = isBoss ? '👑 Boss' : `👤 Lv.${n} ${types[i]}`;
                preview.appendChild(e);
            }

            const baseGold = n * 80 + (isBoss ? n * 200 : 0);
            document.getElementById('rewardPreview').innerHTML = `<span>+${baseGold} Gold</span>${isBoss ? '<span>+50 Gems (Boss Bonus)</span>' : ''}`;
            updateUI();
        }

        function renderParty() {
            const grid = document.getElementById('partyGrid'); grid.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const slot = document.createElement('div');
                slot.className = 'party-slot' + (party[i] ? ' filled' : '');
                slot.innerHTML = party[i] ?
                    `<img src="${party[i].img}" class="hero-img" onerror="this.style.background='var(--star3)'">
           <div class="hero-name">${party[i].name}</div>
           <button class="remove-btn" onclick="removeHero(${i})">×</button>` :
                    `<div style="font-size:0.8rem;color:var(--text-muted)">Empty</div>`;
                grid.appendChild(slot);
            }
            updateUI();
        }

        function renderHeroPool() {
            const pool = document.getElementById('heroPool'); pool.innerHTML = '';
            ownedHeroes.sort((a, b) => b.star - a.star).forEach(h => {
                const div = document.createElement('div'); div.className = 'pool-hero';
                div.innerHTML = `<img src="${h.img}" onerror="this.style.background='var(--star${h.star})'"><div class="star">${'★'.repeat(h.star)}</div>`;
                div.onclick = () => addHero(h); pool.appendChild(div);
            });
        }

        function addHero(hero) {
            if (party.length >= 5 || party.some(p => p.id === hero.id)) return;
            party.push({ ...hero, hp: 100 + (hero.star * 40) + Math.floor(hero.star * 2.5 * 5), atk: 10 + (hero.star * 8), maxHp: 0 });
            party[party.length - 1].maxHp = party[party.length - 1].hp;
            renderParty();
        }

        function removeHero(idx) { party.splice(idx, 1); renderParty(); }

        function startCombat() {
            if (party.length !== 5) return;
            document.getElementById('combatOverlay').classList.add('active');
            document.getElementById('combatFloorTitle').textContent = `Floor ${selectedFloor}`;
            document.getElementById('combatLog').innerHTML = '<div class="log-entry">⚔️ Battle Initiated. Prepare your formation.</div>';
            currentTurnIndex = 0;

            const isBoss = selectedFloor % 10 === 0;
            const enemies = [];
            if (isBoss) {
                const hp = 400 + selectedFloor * 15;
                enemies.push({ id: 'boss', name: 'Warden of the Threshold', hp, maxHp: hp, atk: 35 + selectedFloor, img: 'heros/1★ Grave Digger.png', isHero: false });
            } else {
                const types = ['Goblin', 'Skeleton', 'Imp'];
                for (let i = 0; i < 3; i++) {
                    const hp = 60 + selectedFloor * 6;
                    enemies.push({ id: `e${i}`, name: `Lv.${selectedFloor} ${types[i]}`, hp, maxHp: hp, atk: 12 + selectedFloor, img: 'heros/1★ Beggar.png', isHero: false });
                }
            }
            combatants = [...party.map(p => ({ ...p, isHero: true })), ...enemies];
            renderCombatants(); nextTurn();
        }

        function renderCombatants() {
            const hStage = document.getElementById('heroesStage'); const eStage = document.getElementById('enemiesStage');
            hStage.innerHTML = ''; eStage.innerHTML = '';
            combatants.forEach((c, i) => {
                const alive = c.hp > 0;
                const div = document.createElement('div');
                div.className = `combatant ${!alive ? 'dead' : ''} ${i === currentTurnIndex && alive ? 'active-turn' : ''}`;
                div.innerHTML = `
          <img src="${c.img}" onerror="this.style.background='var(--star3)'">
          <div class="combatant-info">
            <div class="name">${c.name}</div>
            <div class="hp-bar"><div class="hp-fill" style="width:${(c.hp / c.maxHp) * 100}%"></div></div>
            <div class="hp-text">${c.hp}/${c.maxHp}</div>
          </div>`;
                (c.isHero ? hStage : eStage).appendChild(div);
            });
        }

        function nextTurn() {
            if (combatInterval) clearTimeout(combatInterval);
            const delay = 800 / battleSpeed;
            const active = combatants[currentTurnIndex];
            if (!active || active.hp <= 0) {
                currentTurnIndex = (currentTurnIndex + 1) % combatants.length;
                if (autoBattle) combatInterval = setTimeout(nextTurn, 150 / battleSpeed);
                return;
            }
            renderCombatants();
            const isHero = active.isHero;
            const targets = combatants.filter(c => c.isHero !== isHero && c.hp > 0);
            if (targets.length === 0) { endCombat(true, isHero); return; }
            const target = targets[Math.floor(Math.random() * targets.length)];
            const dmg = Math.max(5, Math.floor(active.atk * (0.8 + Math.random() * 0.4)));
            const crit = Math.random() > 0.85;
            const finalDmg = crit ? Math.floor(dmg * 1.5) : dmg;
            target.hp -= finalDmg; if (target.hp < 0) target.hp = 0;
            const log = document.getElementById('combatLog');
            const entry = document.createElement('div'); entry.className = 'log-entry';
            entry.innerHTML = `${crit ? '<span class="crit">CRIT!</span> ' : ''}<b>${active.name}</b> attacks <b>${target.name}</b> for <span class="dmg">-${finalDmg}</span> HP`;
            log.prepend(entry);
            renderCombatants();
            if (!checkBattleEnd()) {
                currentTurnIndex = (currentTurnIndex + 1) % combatants.length;
                if (autoBattle) combatInterval = setTimeout(nextTurn, delay);
            }
        }

        function checkBattleEnd() {
            const heroesAlive = combatants.some(c => c.isHero && c.hp > 0);
            const enemiesAlive = combatants.some(c => !c.isHero && c.hp > 0);
            if (!heroesAlive) { endCombat(false, false); return true; }
            if (!enemiesAlive) { endCombat(false, true); return true; }
            return false;
        }

        function endCombat(isForced, victory) {
            if (combatInterval) clearTimeout(combatInterval); combatInterval = null;
            if (isForced) return;
            const modal = document.getElementById('resultModal');
            const title = document.getElementById('resultTitle');
            title.className = `result-title ${victory ? 'victory' : 'defeat'}`;
            title.textContent = victory ? 'VICTORY' : 'DEFEAT';
            document.getElementById('resultMsg').textContent = victory ? `Floor ${selectedFloor} cleared.` : 'Your heroes fell. The trial resets.';
            if (victory) {
                if (selectedFloor > state.clearedFloor) state.clearedFloor = selectedFloor;
                const g = selectedFloor * 80 + (selectedFloor % 10 === 0 ? selectedFloor * 200 : 0);
                const ge = selectedFloor % 10 === 0 ? 50 : 0;
                state.gold += g; state.gems += ge;
                document.getElementById('resultRewards').textContent = `+${g} Gold${ge ? ` +${ge} Gems` : ''}`;
            } else { document.getElementById('resultRewards').textContent = 'No rewards'; }
            saveState(); modal.classList.add('show'); updateUI();
        }

        function closeResult() {
            document.getElementById('resultModal').classList.remove('show');
            document.getElementById('combatOverlay').classList.remove('active');
            document.getElementById('combatLog').innerHTML = '';
            combatants = []; renderFloors();
        }

        function bindEvents() {
            document.getElementById('enterBtn').onclick = startCombat;
            document.querySelectorAll('.toggle').forEach(t => t.onclick = () => { autoBattle = !autoBattle; updateUI(); });
            document.querySelectorAll('.speed-btn').forEach(btn => btn.onclick = () => { battleSpeed = parseInt(btn.dataset.speed); updateUI(); });
        }

        init();
    </script>
</body>

</html>
