<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pick Me Up — Achievements</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-bright: #e8c96a;
            --gold-dim: #7a5f28;
            --gold-glow: rgba(201, 168, 76, 0.3);
            --star5: #ffd700;
            --star4: #c080ff;
            --star3: #60a0ff;
            --star2: #60ff80;
            --star1: #aaaaaa;
            --red: #cc2222;
            --purple: #7c3fb0;
            --dark: #06060e;
            --panel: rgba(8, 6, 18, 0.82);
            --panel-solid: rgba(10, 8, 22, 0.95);
            --border: rgba(201, 168, 76, 0.25);
            --border-bright: rgba(201, 168, 76, 0.6);
            --text: #e8e0d0;
            --text-muted: #7a6f5a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Crimson Text', serif;
            background: var(--dark);
            color: var(--text);
        }

        .global-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: url('images/summon-bg.jpg');
            background-size: cover;
            background-position: center;
        }

        .global-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(4, 4, 14, 0.65);
            pointer-events: none;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold-dim);
            border-radius: 4px;
        }

        .cinzel {
            font-family: 'Cinzel', serif;
        }

        .topbar {
            position: relative;
            z-index: 10;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            backdrop-filter: blur(14px);
            background: rgba(4, 4, 14, 0.92);
            border-bottom: 1px solid var(--border);
        }

        .topbar .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .topbar .back-btn:hover {
            color: var(--gold-bright);
        }

        .topbar .title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        .main-area {
            position: relative;
            z-index: 10;
            padding: 20px;
            height: calc(100% - 60px);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .panel {
            background: var(--panel);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .corner-ornament {
            position: relative;
        }

        .corner-ornament::before,
        .corner-ornament::after {
            content: '';
            position: absolute;
            width: 13px;
            height: 13px;
            border: 2px solid var(--gold);
        }

        .corner-ornament::before {
            top: 4px;
            left: 4px;
            border-right: 0;
            border-bottom: 0;
        }

        .corner-ornament::after {
            bottom: 4px;
            right: 4px;
            border-left: 0;
            border-top: 0;
        }

        .tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        .tab {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.75rem;
            font-family: 'Cinzel', serif;
            transition: 0.2s;
            white-space: nowrap;
        }

        .tab.active {
            background: rgba(201, 168, 76, 0.15);
            border-color: var(--gold);
            color: var(--gold-bright);
        }

        .achieve-grid {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .achieve-card {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            position: relative;
            transition: 0.2s;
        }

        .achieve-card:hover {
            transform: translateY(-2px);
            border-color: var(--border-bright);
        }

        .achieve-card.ready {
            border-color: var(--star5);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .achieve-card.completed {
            opacity: 0.7;
        }

        .achieve-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .achieve-icon {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 2px solid var(--border);
        }

        .achieve-title {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            flex: 1;
        }

        .achieve-status {
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-family: 'Cinzel', serif;
        }

        .status-progress {
            background: rgba(96, 160, 255, 0.2);
            color: var(--star3);
        }

        .status-ready {
            background: rgba(255, 215, 0, 0.2);
            color: var(--star5);
        }

        .status-done {
            background: rgba(96, 255, 128, 0.2);
            color: var(--star2);
        }

        .achieve-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .progress-wrap {
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright));
            width: 0%;
            transition: width 0.4s;
        }

        .achieve-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reward-preview {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .claim-btn {
            padding: 4px 10px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 4px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .claim-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .claim-flash {
            animation: flash 0.5s ease;
        }

        @keyframes flash {
            0% {
                box-shadow: 0 0 0 var(--gold);
            }

            50% {
                box-shadow: 0 0 15px var(--gold);
            }

            100% {
                box-shadow: 0 0 0 var(--gold);
            }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--panel-solid);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--panel);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 24px;
            max-width: 320px;
            width: 90%;
            text-align: center;
        }

        .modal-title {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 12px;
        }

        .modal-reward {
            font-size: 1.1rem;
            margin: 16px 0;
            color: var(--star5);
        }

        .modal-btn {
            margin-top: 12px;
            padding: 10px 24px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 8px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="global-bg"></div>
    <header class="topbar">
        <div class="back-btn" onclick="location.href='index.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Back
        </div>
        <div class="title">◆ ACHIEVEMENTS ◆</div>
    </header>

    <main class="main-area">
        <section class="panel corner-ornament">
            <h2 class="cinzel"
                style="font-size:1.1rem; margin-bottom:12px; color:var(--gold); border-bottom:1px solid var(--border); padding-bottom:8px;">
                PROGRESS TRACKER</h2>
            <div class="tabs" id="catTabs"></div>
            <div class="achieve-grid" id="achieveGrid"></div>
        </section>
    </main>

    <div class="modal-overlay" id="claimModal">
        <div class="modal">
            <div class="modal-title">🏆 ACHIEVEMENT UNLOCKED</div>
            <div id="modalTitle" style="color:var(--text); font-size:0.9rem; margin-bottom:8px;"></div>
            <div class="modal-reward" id="modalReward"></div>
            <button class="modal-btn" onclick="closeModal()">ACCEPT REWARD</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'achieve_state';
        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { achievements: {} };
        let currentCat = 'all';

        const ACHIEVEMENTS = [
            { id: 'a1', cat: 'combat', title: 'First Blood', desc: 'Win your first combat encounter', target: 1, reward: '200 Gold', icon: '⚔️' },
            { id: 'a2', cat: 'combat', title: 'Veteran', desc: 'Win 50 combat encounters', target: 50, reward: '500 Gold, 50 Gems', icon: '🛡️' },
            { id: 'a3', cat: 'summon', title: 'Lucky Draw', desc: 'Summon a 4★ Hero', target: 1, reward: '100 Gems', icon: '🌟' },
            { id: 'a4', cat: 'summon', title: 'Fate Weaver', desc: 'Perform 100 Summons', target: 100, reward: '1 Material, 300 Gems', icon: '🔮' },
            { id: 'a5', cat: 'tower', title: 'Floor Walker', desc: 'Clear Floor 20 in the Tower', target: 20, reward: '3 Stones', icon: '🗼' },
            { id: 'a6', cat: 'tower', title: 'Ascension', desc: 'Reach Floor 50', target: 50, reward: '1000 Gold, 100 Gems', icon: '👑' },
            { id: 'a7', cat: 'dungeon', title: 'Dungeon Crawler', desc: 'Clear 10 Dungeons', target: 10, reward: '2 Materials', icon: '🕳️' },
            { id: 'a8', cat: 'collection', title: 'Hoarder', desc: 'Own 20 different heroes', target: 20, reward: '50 Gems', icon: '📦' },
            { id: 'a9', cat: 'general', title: 'Daily Devotion', desc: 'Log in for 7 consecutive days', target: 7, reward: '1★ Hero Token', icon: '📅' },
            { id: 'a10', cat: 'general', title: 'Wealthy', desc: 'Accumulate 50,000 Gold', target: 50000, reward: '100 Gems', icon: '💰' }
        ];

        function init() {
            ACHIEVEMENTS.forEach(a => { if (!state.achievements[a.id]) state.achievements[a.id] = { progress: Math.floor(Math.random() * a.target), claimed: false }; });
            renderTabs(); renderAchievements(); updateProgressSim();
        }

        function saveState() { localStorage.setItem('achieve_state', JSON.stringify(state)); }

        function renderTabs() {
            const cats = ['all', ...new Set(ACHIEVEMENTS.map(a => a.cat))];
            const container = document.getElementById('catTabs'); container.innerHTML = '';
            cats.forEach(c => {
                const tab = document.createElement('div');
                tab.className = `tab ${c === currentCat ? 'active' : ''}`;
                tab.textContent = c.charAt(0).toUpperCase() + c.slice(1);
                tab.onclick = () => { currentCat = c; renderTabs(); renderAchievements(); };
                container.appendChild(tab);
            });
        }

        function renderAchievements() {
            const grid = document.getElementById('achieveGrid'); grid.innerHTML = '';
            const filtered = currentCat === 'all' ? ACHIEVEMENTS : ACHIEVEMENTS.filter(a => a.cat === currentCat);
            filtered.forEach(a => {
                const s = state.achievements[a.id];
                const pct = Math.min((s.progress / a.target) * 100, 100);
                const isReady = s.progress >= a.target && !s.claimed;
                const isDone = s.claimed;
                const card = document.createElement('div');
                card.className = `achieve-card ${isReady ? 'ready' : ''} ${isDone ? 'completed' : ''}`;
                card.innerHTML = `
          <div class="achieve-header">
            <div class="achieve-icon">${a.icon}</div>
            <div class="achieve-title">${a.title}</div>
            <div class="achieve-status ${isDone ? 'status-done' : isReady ? 'status-ready' : 'status-progress'}">${isDone ? 'DONE' : isReady ? 'CLAIM' : 'ACTIVE'}</div>
          </div>
          <div class="achieve-desc">${a.desc}</div>
          <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="achieve-footer">
            <div class="reward-preview">🎁 ${a.reward}</div>
            <button class="claim-btn ${isReady ? 'claim-flash' : ''}" ${!isReady ? 'disabled' : ''} onclick="claimAchieve('${a.id}')">${isDone ? '✓' : 'CLAIM'}</button>
          </div>
        `;
                grid.appendChild(card);
            });
        }

        function claimAchieve(id) {
            const a = ACHIEVEMENTS.find(x => x.id === id);
            const s = state.achievements[id];
            if (!a || s.progress < a.target || s.claimed) return;
            s.claimed = true;
            document.getElementById('modalTitle').textContent = a.title;
            document.getElementById('modalReward').textContent = `Reward: ${a.reward}`;
            document.getElementById('claimModal').classList.add('active');
            saveState(); renderAchievements();
        }

        function closeModal() { document.getElementById('claimModal').classList.remove('active'); }

        function updateProgressSim() {
            setInterval(() => {
                let changed = false;
                ACHIEVEMENTS.forEach(a => {
                    const s = state.achievements[a.id];
                    if (!s.claimed && s.progress < a.target && Math.random() > 0.7) {
                        s.progress = Math.min(s.progress + 1, a.target);
                        changed = true;
                    }
                });
                if (changed) { saveState(); renderAchievements(); }
            }, 6000);
        }

        init();
    </script>
</body>

</html>
