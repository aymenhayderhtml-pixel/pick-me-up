<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pick Me Up — Daily Rewards</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-bright: #e8c96a;
            --gold-dim: #7a5f28;
            --gold-glow: rgba(201, 168, 76, 0.3);
            --star5: #ffd700;
            --star4: #c080ff;
            --star3: #60a0ff;
            --star2: #60ff80;
            --star1: #aaaaaa;
            --red: #cc2222;
            --purple: #7c3fb0;
            --dark: #06060e;
            --panel: rgba(8, 6, 18, 0.82);
            --panel-solid: rgba(10, 8, 22, 0.95);
            --border: rgba(201, 168, 76, 0.25);
            --border-bright: rgba(201, 168, 76, 0.6);
            --text: #e8e0d0;
            --text-muted: #7a6f5a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Crimson Text', serif;
            background: var(--dark);
            color: var(--text);
        }

        .global-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: url('images/summon-bg.jpg');
            background-size: cover;
            background-position: center;
        }

        .global-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(4, 4, 14, 0.65);
            pointer-events: none;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold-dim);
            border-radius: 4px;
        }

        .cinzel {
            font-family: 'Cinzel', serif;
        }

        .crimson {
            font-family: 'Crimson Text', serif;
        }

        .topbar {
            position: relative;
            z-index: 10;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            backdrop-filter: blur(14px);
            background: rgba(4, 4, 14, 0.92);
            border-bottom: 1px solid var(--border);
        }

        .topbar .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .topbar .back-btn:hover {
            color: var(--gold-bright);
        }

        .topbar .title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        .topbar .resources {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .res-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }

        .res-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .main-scroll {
            position: relative;
            z-index: 10;
            padding: 20px;
            height: calc(100% - 60px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 80px;
        }

        .panel {
            background: var(--panel);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            position: relative;
        }

        .corner-ornament {
            position: relative;
        }

        .corner-ornament::before,
        .corner-ornament::after {
            content: '';
            position: absolute;
            width: 13px;
            height: 13px;
            border: 2px solid var(--gold);
        }

        .corner-ornament::before {
            top: 4px;
            left: 4px;
            border-right: 0;
            border-bottom: 0;
        }

        .corner-ornament::after {
            bottom: 4px;
            right: 4px;
            border-left: 0;
            border-top: 0;
        }

        .panel-title {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--gold);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .login-track {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 4px 2px 8px;
        }

        .login-day {
            min-width: 60px;
            padding: 10px 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            position: relative;
            transition: 0.2s;
        }

        .login-day.today {
            border-color: var(--gold-bright);
            box-shadow: 0 0 10px var(--gold-glow);
            background: rgba(201, 168, 76, 0.1);
        }

        .login-day.claimed {
            opacity: 0.5;
            border-color: var(--star2);
        }

        .login-day .day-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .login-day .day-icon {
            font-size: 1.4rem;
            margin: 4px 0;
        }

        .login-day .claim-btn {
            padding: 3px 0;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 4px;
        }

        .login-day .claim-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .quest-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .quest-card {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }

        .quest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .quest-title {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
        }

        .quest-timer {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .quest-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .progress-wrap {
            height: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright));
            width: 0%;
            transition: width 0.4s;
        }

        .quest-reward-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .quest-rewards {
            display: flex;
            gap: 8px;
        }

        .reward-tag {
            font-size: 0.7rem;
            padding: 3px 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .quest-claim {
            padding: 6px 14px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 6px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .quest-claim:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .claim-flash {
            animation: flash 0.5s ease;
        }

        @keyframes flash {
            0% {
                box-shadow: 0 0 0 var(--gold);
            }

            50% {
                box-shadow: 0 0 20px var(--gold);
            }

            100% {
                box-shadow: 0 0 0 var(--gold);
            }
        }
    </style>
</head>

<body>
    <div class="global-bg"></div>
    <header class="topbar">
        <div class="back-btn" onclick="location.href='index.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Back
        </div>
        <div class="title">◆ DAILY REWARDS ◆</div>
        <div class="resources">
            <div class="res-item">
                <div class="res-icon" style="background:#60a0ff"></div><span id="goldDisp">0</span>
            </div>
            <div class="res-item">
                <div class="res-icon" style="background:#e8c96a"></div><span id="gemDisp">0</span>
            </div>
        </div>
    </header>

    <main class="main-scroll">
        <section class="panel corner-ornament">
            <h2 class="panel-title">🎁 7-DAY LOGIN STREAK</h2>
            <div class="login-track" id="loginTrack"></div>
            <p style="margin-top:10px; font-size:0.8rem; color:var(--text-muted);">Log in daily to claim rewards.
                Missing a day resets your streak.</p>
        </section>

        <section class="panel corner-ornament">
            <h2 class="panel-title">📜 DAILY QUESTS</h2>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <span style="font-size:0.85rem;">Resets in: <span class="cinzel" id="resetTimer"
                        style="color:var(--gold-bright);">--:--:--</span></span>
                <button onclick="refreshQuests()"
                    style="background:rgba(255,255,255,0.1); border:1px solid var(--border); color:var(--text); padding:4px 8px; border-radius:4px; cursor:pointer; font-size:0.7rem;">🔄
                    Refresh</button>
            </div>
            <div class="quest-list" id="questList"></div>
        </section>
    </main>

    <script>
        const STORAGE_KEY = 'daily_state';
        let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            streak: 0, lastLogin: null, claimedDays: [], quests: []
        };
        let playerRes = JSON.parse(localStorage.getItem('player_res')) || { gold: 15420, gems: 280 };

        const DAILY_REWARDS = [
            { icon: '🪙', label: '500 Gold' }, { icon: '⚡', label: '30 Stamina' },
            { icon: '🔮', label: '50 Gems' }, { icon: '📜', label: '2 Stones' },
            { icon: '🪙', label: '1000 Gold' }, { icon: '💎', label: '1 Material' },
            { icon: '⭐', label: '1★ Hero Token' }
        ];

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            localStorage.setItem('player_res', JSON.stringify(playerRes));
        }

        function updateResUI() {
            document.getElementById('goldDisp').textContent = playerRes.gold.toLocaleString();
            document.getElementById('gemDisp').textContent = playerRes.gems.toLocaleString();
        }

        function checkLogin() {
            const today = new Date().toDateString();
            if (state.lastLogin !== today) {
                if (state.lastLogin) {
                    const last = new Date(state.lastLogin);
                    const diff = Math.floor((new Date(today) - last) / (1000 * 60 * 60 * 24));
                    if (diff > 1) state.streak = 0;
                }
                state.lastLogin = today;
                state.streak = Math.min((state.streak % 7) + 1, 7);
                state.claimedDays = [];
            }
            renderLoginTrack();
        }

        function renderLoginTrack() {
            const track = document.getElementById('loginTrack');
            track.innerHTML = '';
            DAILY_REWARDS.forEach((reward, i) => {
                const day = i + 1;
                const isClaimed = state.claimedDays.includes(day);
                const isToday = day === state.streak;
                const div = document.createElement('div');
                div.className = `login-day ${isClaimed ? 'claimed' : ''} ${isToday ? 'today' : ''}`;
                div.innerHTML = `
          <div class="day-label">DAY ${day}</div>
          <div class="day-icon">${reward.icon}</div>
          <div style="font-size:0.6rem;color:var(--text-muted)">${reward.label}</div>
          ${isToday && !isClaimed ? `<button class="claim-btn" onclick="claimLogin(${day})">CLAIM</button>` : isClaimed ? `<button class="claim-btn" disabled>✓</button>` : `<button class="claim-btn" disabled>🔒</button>`}
        `;
                track.appendChild(div);
            });
        }

        function claimLogin(day) {
            state.claimedDays.push(day);
            playerRes.gold += 500;
            playerRes.gems += 50;
            saveState(); updateResUI(); renderLoginTrack();
        }

        const QUEST_TEMPLATES = [
            { id: 1, title: 'Clear Tower Floors', desc: 'Complete 5 Tower Floors', target: 5, reward: '500 Gold, 20 Gems', type: 'tower' },
            { id: 2, title: 'Summon Heroes', desc: 'Perform 3 Summons', target: 3, reward: '100 Gems', type: 'summon' },
            { id: 3, title: 'Dungeon Runs', desc: 'Clear 2 Dungeons', target: 2, reward: '800 Gold, 1 Mat', type: 'dungeon' },
            { id: 4, title: 'Synthesize Heroes', desc: 'Promote 1 Hero', target: 1, reward: '3 Stones', type: 'synth' },
            { id: 5, title: 'Spend Stamina', desc: 'Use 40 Stamina', target: 40, reward: '300 Gold', type: 'stamina' }
        ];

        function initQuests() {
            if (!state.quests.length) {
                state.quests = QUEST_TEMPLATES.map(q => ({ ...q, progress: Math.floor(Math.random() * q.target), claimed: false }));
            }
            renderQuests();
        }

        function renderQuests() {
            const list = document.getElementById('questList');
            list.innerHTML = '';
            state.quests.forEach(q => {
                const pct = Math.min((q.progress / q.target) * 100, 100);
                const isReady = q.progress >= q.target && !q.claimed;
                const isClaimed = q.claimed;
                const div = document.createElement('div');
                div.className = 'quest-card';
                div.innerHTML = `
          <div class="quest-header">
            <div class="quest-title">${q.title}</div>
            <div class="quest-timer">${isClaimed ? '✅ Done' : isReady ? '🎁 Ready' : '🔄 Active'}</div>
          </div>
          <div class="quest-desc">${q.desc}</div>
          <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="quest-reward-row">
            <div class="quest-rewards">${q.reward.split(',').map(r => `<span class="reward-tag">🎯 ${r.trim()}</span>`).join('')}</div>
            <button class="quest-claim ${isReady ? 'claim-flash' : ''}" ${!isReady ? 'disabled' : ''} onclick="claimQuest(${q.id})">${isClaimed ? 'CLAIMED' : 'CLAIM'}</button>
          </div>
        `;
                list.appendChild(div);
            });
        }

        function claimQuest(id) {
            const q = state.quests.find(x => x.id === id);
            if (!q || q.progress < q.target || q.claimed) return;
            q.claimed = true;
            playerRes.gold += 200; playerRes.gems += 50;
            saveState(); updateResUI(); renderQuests();
        }

        function refreshQuests() {
            state.quests = QUEST_TEMPLATES.map(q => ({ ...q, progress: 0, claimed: false }));
            saveState(); renderQuests();
        }

        function updateTimer() {
            const now = new Date();
            const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1); tomorrow.setHours(0, 0, 0, 0);
            const diff = tomorrow - now;
            const h = String(Math.floor(diff / (1000 * 60 * 60))).padStart(2, '0');
            const m = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
            const s = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
            document.getElementById('resetTimer').textContent = `${h}:${m}:${s}`;
        }

        function init() {
            checkLogin(); initQuests(); updateResUI(); updateTimer();
            setInterval(updateTimer, 1000);
            // Simulate daily progress for demo
            setInterval(() => {
                state.quests.forEach(q => { if (!q.claimed && q.progress < q.target) q.progress = Math.min(q.progress + 1, q.target); });
                renderQuests(); saveState();
            }, 8000);
        }
        init();
    </script>
</body>

</html>
